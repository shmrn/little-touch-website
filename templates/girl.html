<!DOCTYPE html>
<html>
<head>

<title>New Arrivals</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<h1 class="collection-title">

    Girl Collection

</h1>


<section class="dress-grid">

  <div class="dress-card">

    <img src="/static/images/dress1.png"

    onclick="openProduct(
    [
    '/static/images/dress1-1.png',

    '/static/images/dress1-2.png',
    ]
    )">

</div>

    <img src="/static/images/dress2.png">

    <img src="/static/images/dress3.png">

    <img src="/static/images/dress4.png">

</section>
<!-- PRODUCT POPUP -->

<div id="productModal"
class="product-modal">

    <span class="close-btn"
    onclick="closeProduct()">

        ×

    </span>


    <img id="modalImage"

    class="modal-image">


    <button class="arrow left"
    onclick="prevImage()">

        ❮

    </button>


    <button class="arrow right"
    onclick="nextImage()">

        ❯

    </button>


    <div class="slider-dots"
    id="modalDots">

    </div>

</div>
<script>

let images = [];

let currentIndex = 0;

let slideInterval;


function openProduct(productImages){

images = productImages;

currentIndex = 0;

document.getElementById(
"productModal"
).style.display =
"flex";

updateModal();

slideInterval =
setInterval(
nextImage,
2500
);
}


function closeProduct(){

document.getElementById(
"productModal"
).style.display =
"none";

clearInterval(
slideInterval
);
}


function updateModal(){

document.getElementById(
"modalImage"
).src =
images[currentIndex];

const dotsContainer =
document.getElementById(
"modalDots"
);

dotsContainer.innerHTML =
"";

images.forEach(
(_, index) => {

const dot =
document.createElement(
"span"
);

dot.className =
"dot";

if(index ===
currentIndex){

dot.classList.add(
"active"
);
}

dot.onclick =
() => {

currentIndex =
index;

updateModal();
};

dotsContainer
.appendChild(dot);

});
}


function nextImage(){

currentIndex =
(currentIndex + 1)
% images.length;

updateModal();
}


function prevImage(){

currentIndex =
(currentIndex - 1 +
images.length)
% images.length;

updateModal();
}

</script>
</body>
</html>
